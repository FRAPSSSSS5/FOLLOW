<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLW Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    width: 700px;
    height: 200px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI", Arial, sans-serif;
  }
  #notif {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    opacity: 0;
    transform: scale(0.85) translateY(10px);
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #notif.show {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }
  .card {
    background: rgba(0,0,0,0.78);
    border: 2px solid rgba(255,200,0,0.5);
    border-radius: 16px;
    padding: 18px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow: 0 0 30px rgba(255,200,0,0.15), 0 4px 20px rgba(0,0,0,0.6);
  }
  .title {
    font-size: 42px;
    font-weight: 900;
    color: #FFD700;
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(255,215,0,0.8), 0 2px 6px rgba(0,0,0,0.9);
    line-height: 1;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,200,0,0.5), transparent);
    margin: 2px 0;
  }
  .sub {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sub .arrow { color: #FFD700; font-size: 14px; }
  #username {
    color: #FFD700;
    font-size: 20px;
    font-weight: 900;
    text-shadow: 0 0 8px rgba(255,215,0,0.7);
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #queue-badge {
    display: none;
    margin-top: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    font-family: monospace;
  }
</style>
</head>
<body>
<div id="notif">
  <div class="card">
    <div class="title">FLW = 1 SPIN</div>
    <div class="divider"></div>
    <div class="sub">FOLLOW <span class="arrow">▼</span></div>
    <div id="username">@username</div>
  </div>
  <div id="queue-badge"></div>
</div>
<script>
const notif      = document.getElementById("notif");
const usernameEl = document.getElementById("username");
const queueBadge = document.getElementById("queue-badge");
let queue   = [];
let running = false;

function showNotif(name) {
  usernameEl.textContent = "@" + name;
  notif.classList.add("show");
}
function hideNotif() { notif.classList.remove("show"); }
function updateBadge() {
  if (queue.length > 0) {
    queueBadge.style.display = "block";
    queueBadge.textContent = "+" + queue.length + " antrian";
  } else {
    queueBadge.style.display = "none";
  }
}
function runNotif(name) {
  return new Promise(resolve => {
    showNotif(name);
    setTimeout(() => {
      hideNotif();
      setTimeout(resolve, 500);
    }, 4000);
  });
}
async function processQueue() {
  if (running || queue.length === 0) return;
  running = true;
  while (queue.length > 0) {
    const name = queue.shift();
    updateBadge();
    await runNotif(name);
  }
  running = false;
  updateBadge();
}
function addFollow(name) {
  if (queue.length >= 30) return;
  queue.push(name);
  updateBadge();
  if (!running) processQueue();
}
function connect() {
  const params = new URLSearchParams(window.location.search);
  const wsHost = params.get("ws") || "localhost:21213";
  const ws = new WebSocket("ws://" + wsHost + "/");
  ws.onopen = () => console.log("[TikFinity] Terhubung");
  ws.onmessage = (e) => {
    try {
      const res = JSON.parse(e.data);
      if (res.event === "follow") {
        const name = res.data?.nickname || res.data?.uniqueId || "follower";
        addFollow(name);
      }
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(connect, 3000);
}
connect();
window.addFollow = addFollow;
</script>
</body>
</html>
