<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLW Spin Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 700px;
    height: 280px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Rajdhani", "Segoe UI", Arial, sans-serif;
  }

  /* WRAPPER UTAMA */
  #overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 700px;
    gap: 0;
    opacity: 0;
    transform: scale(0.92) translateY(-14px);
    pointer-events: none;
    transition: opacity 0.45s cubic-bezier(0.22,1,0.36,1), transform 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  #overlay.show {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }

  /* ── NOTIF CARD ── */
  #notif-card {
    background: linear-gradient(180deg, rgba(10,6,2,0.97) 0%, rgba(18,10,3,0.95) 100%);
    border: 2px solid #ff6a00;
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    padding: 10px 48px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    width: 700px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,106,0,0.3),
      0 -4px 30px rgba(255,106,0,0.25),
      inset 0 1px 0 rgba(255,160,60,0.15);
  }

  /* animated shimmer top line */
  #notif-card::before {
    content: "";
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, #ff9a40, #fff, #ff9a40, transparent);
    animation: shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { left: -100%; }
    60%  { left: 100%; }
    100% { left: 100%; }
  }

  /* corner accents */
  #notif-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,100,0,0.08), transparent);
    pointer-events: none;
  }

  .flw-title {
    font-family: "Bebas Neue", "Segoe UI", Arial, sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #ff8c30;
    letter-spacing: 5px;
    text-shadow: 0 0 10px rgba(255,120,30,0.7);
    line-height: 1;
  }

  .flw-sub {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .flw-sub .arrow { color: #ff6a00; }

  #flw-username {
    font-family: "Bebas Neue", "Segoe UI", Arial, sans-serif;
    color: #ffffff;
    font-size: 50px;
    font-weight: 400;
    letter-spacing: 2px;
    text-shadow:
      0 0 20px rgba(255,140,40,0.9),
      0 0 40px rgba(255,100,0,0.5),
      0 2px 4px rgba(0,0,0,1);
    max-width: 580px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.1;
  }

  /* ── SPIN SECTION ── */
  #spin-section {
    width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.55s cubic-bezier(0.22,1,0.36,1);
  }
  #spin-section.open {
    max-height: 200px;
  }

  /* pointer */
  .pointer {
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 20px solid #ff6a00;
    margin-bottom: -1px;
    filter: drop-shadow(0 0 6px rgba(255,106,0,0.9)) drop-shadow(0 2px 3px rgba(0,0,0,0.8));
    z-index: 10;
  }

  /* slot window */
  .spin-window {
    width: 700px;
    height: 118px;
    background: linear-gradient(180deg, rgba(5,2,0,0.98) 0%, rgba(12,6,2,0.96) 100%);
    border-radius: 0 0 16px 16px;
    overflow: hidden;
    border: 2px solid #ff6a00;
    border-top: none;
    box-shadow:
      0 0 0 1px rgba(255,106,0,0.2),
      0 6px 30px rgba(255,80,0,0.2),
      inset 0 0 40px rgba(0,0,0,0.6);
    position: relative;
  }

  /* vignette */
  .spin-window::before,
  .spin-window::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 130px;
    z-index: 2;
    pointer-events: none;
  }
  .spin-window::before {
    left: 0;
    background: linear-gradient(to right, rgba(5,2,0,0.97), transparent);
  }
  .spin-window::after {
    right: 0;
    background: linear-gradient(to left, rgba(5,2,0,0.97), transparent);
  }

  /* center indicator */
  .center-line {
    position: absolute;
    left: 50%; top: 6px; bottom: 6px;
    transform: translateX(-50%);
    width: 142px;
    border: 2px solid #ff6a00;
    border-radius: 10px;
    z-index: 3;
    pointer-events: none;
    box-shadow:
      0 0 0 1px rgba(255,106,0,0.2),
      0 0 16px rgba(255,106,0,0.5),
      inset 0 0 16px rgba(255,80,0,0.08);
  }

  /* center glow pulse */
  .center-line::before {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 13px;
    border: 1px solid rgba(255,106,0,0.25);
    animation: pulse-ring 1.8s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%       { opacity: 0.7; transform: scale(1.01); }
  }

  /* track */
  .track {
    display: flex;
    align-items: center;
    height: 118px;
    will-change: transform;
  }

  /* kotak slot */
  .box {
    min-width: 138px;
    width: 138px;
    height: 96px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    margin: 0 1px;
    font-weight: 900;
    user-select: none;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .box-icon  { font-size: 28px; margin-bottom: 6px; line-height: 1; }
  .box-label {
    font-family: "Bebas Neue", Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    font-weight: 400;
  }

  /* ZONK — merah membara */
  .zonk {
    background: linear-gradient(155deg, #1c0505 0%, #2e0a0a 50%, #1a0404 100%);
    border: 1px solid rgba(200,30,30,0.5);
    color: #e03030;
    box-shadow: inset 0 0 20px rgba(180,0,0,0.2);
  }
  .zonk::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(220,40,40,0.12), transparent);
  }
  .zonk .box-icon {
    filter: drop-shadow(0 0 6px rgba(255,50,50,0.8));
  }

  /* JACKPOT — emas menyala */
  .jackpot {
    background: linear-gradient(155deg, #1a1200 0%, #2c1e00 50%, #181000 100%);
    border: 1px solid rgba(255,180,0,0.6);
    color: #ffcc00;
    box-shadow:
      inset 0 0 20px rgba(255,160,0,0.15),
      0 0 8px rgba(255,160,0,0.15);
  }
  .jackpot::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,200,0,0.15), transparent);
  }
  .jackpot .box-icon {
    filter: drop-shadow(0 0 8px rgba(255,200,0,1));
  }

  /* ── RESULT BADGE ── */
  #result-badge {
    margin-top: 8px;
    padding: 6px 28px;
    border-radius: 40px;
    font-family: "Bebas Neue", Arial, sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 3px;
    opacity: 0;
    transform: scale(0.7) translateY(6px);
    transition: opacity 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  #result-badge.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  #result-badge.is-jackpot {
    background: linear-gradient(90deg, rgba(255,180,0,0.15), rgba(255,220,0,0.22), rgba(255,180,0,0.15));
    border: 2px solid rgba(255,200,0,0.85);
    color: #FFE040;
    text-shadow: 0 0 12px rgba(255,210,0,0.9), 0 0 30px rgba(255,160,0,0.5);
    box-shadow: 0 0 20px rgba(255,180,0,0.3), inset 0 0 12px rgba(255,180,0,0.08);
  }
  #result-badge.is-zonk {
    background: linear-gradient(90deg, rgba(180,20,20,0.15), rgba(220,30,30,0.2), rgba(180,20,20,0.15));
    border: 2px solid rgba(220,40,40,0.8);
    color: #FF4444;
    text-shadow: 0 0 10px rgba(255,50,50,0.8);
    box-shadow: 0 0 16px rgba(200,20,20,0.25);
  }

  /* queue */
  #queue-badge {
    display: none;
    margin-top: 5px;
    font-size: 10px;
    color: rgba(255,140,60,0.4);
    letter-spacing: 2px;
    font-family: monospace;
  }
</style>
</head>
<body>

<div id="overlay">
  <!-- TAHAP 1: Notif follow -->
  <div id="notif-card">
    <div class="flw-title">FLW = 1 SPIN</div>
    <div class="flw-sub">FOLLOW <span class="arrow">▼</span></div>
    <div id="flw-username">@username</div>
  </div>

  <!-- TAHAP 2: Spin slot -->
  <div id="spin-section">
    <div class="pointer"></div>
    <div class="spin-window">
      <div class="center-line"></div>
      <div class="track" id="track"></div>
    </div>
  </div>

  <div id="result-badge"></div>
  <div id="queue-badge"></div>
</div>

<script>
const overlay     = document.getElementById("overlay");
const spinSection = document.getElementById("spin-section");
const track       = document.getElementById("track");
const flwUsername = document.getElementById("flw-username");
const resultBadge = document.getElementById("result-badge");
const queueBadge  = document.getElementById("queue-badge");

const BOX_W = 140;
const TOTAL = 300;

let boxes   = [];
let queue   = [];
let running = false;

/* ── BUILD TRACK ── */
function buildTrack() {
  track.innerHTML = "";
  boxes = [];
  for (let i = 0; i < TOTAL; i++) {
    const isJackpot = (i % 5 === 0);
    const type = isJackpot ? "jackpot" : "zonk";
    const el = document.createElement("div");
    el.className = "box " + type;
    el.innerHTML = `
      <div class="box-icon">${isJackpot ? "💎" : "💀"}</div>
      <div class="box-label">${isJackpot ? "JACKPOT" : "ZONK"}</div>
    `;
    track.appendChild(el);
    boxes.push({ el, type, index: i });
  }
}
buildTrack();

/* ── HELPERS ── */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateBadge() {
  if (queue.length > 0) {
    queueBadge.style.display = "block";
    queueBadge.textContent = "+" + queue.length + " antrian";
  } else {
    queueBadge.style.display = "none";
  }
}

/* ── MAIN FLOW ── */
async function runFollow(name) {
  // Reset state
  resultBadge.className = "";
  resultBadge.classList.remove("show");
  spinSection.classList.remove("open");
  track.style.transition = "none";
  track.style.transform  = "translateX(0px)";

  // Tampilkan overlay + notif follow
  flwUsername.textContent = "@" + name;
  overlay.classList.add("show");

  // Tunggu 2 detik baca notif
  await sleep(2000);

  // Buka spin section
  spinSection.classList.add("open");
  await sleep(600); // tunggu animasi buka

  // Pilih target
  const isJackpot = Math.random() < 0;
  const pool = boxes.filter(b =>
    b.type === (isJackpot ? "jackpot" : "zonk") &&
    b.index > 200 && b.index < 285
  );
  const target = pool[Math.floor(Math.random() * pool.length)];
  const finalX = target.index * BOX_W - 280;

  // Spin!
  track.offsetHeight; // force reflow
  track.style.transition = "transform 7s cubic-bezier(0.08,0,0.08,1)";
  track.style.transform  = `translateX(-${finalX}px)`;

  await sleep(7400);

  // Tampilkan hasil
  if (target.type === "jackpot") {
    resultBadge.textContent = "⭐ JACKPOT! ⭐";
    resultBadge.className = "is-jackpot";
  } else {
    resultBadge.textContent = "💀 ZONK";
    resultBadge.className = "is-zonk";
  }
  resultBadge.classList.add("show");

  await sleep(2500);

  // Sembunyikan semua
  overlay.classList.remove("show");
  await sleep(600);

  spinSection.classList.remove("open");
  resultBadge.classList.remove("show");
}

/* ── QUEUE ── */
async function processQueue() {
  if (running || queue.length === 0) return;
  running = true;
  updateBadge();

  while (queue.length > 0) {
    const name = queue.shift();
    updateBadge();
    await runFollow(name);
    await sleep(400);
  }

  running = false;
  updateBadge();
}

function addFollow(name) {
  if (queue.length >= 30) return;
  queue.push(name);
  updateBadge();
  if (!running) processQueue();
}

/* ── TIKFINITY ── */
function connect() {
  const params = new URLSearchParams(window.location.search);
  const wsHost = params.get("ws") || "localhost:21213";
  const ws = new WebSocket("ws://" + wsHost + "/");

  ws.onopen  = () => console.log("[TikFinity] Terhubung ✓");
  ws.onmessage = (e) => {
    try {
      const res = JSON.parse(e.data);
      if (res.event === "follow") {
        const name = res.data?.nickname || res.data?.uniqueId || "follower";
        addFollow(name);
      }
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(connect, 3000);
}
connect();

window.addFollow = addFollow;
</script>
</body>
</html>
