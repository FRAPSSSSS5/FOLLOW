<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#030a03;font-family:sans-serif;padding:16px;display:flex;flex-direction:column;gap:12px;align-items:center;}
.label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(0,255,100,0.4);text-align:center;}
.btn-row{display:flex;gap:10px;justify-content:center;}
.btn{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;transition:transform 0.1s;}
.btn:active{transform:scale(0.95);}
.btn-f{background:linear-gradient(135deg,#004d1a,#00aa44);color:#ccffdd;box-shadow:0 0 14px rgba(0,180,60,0.5);}
.btn-j{background:linear-gradient(135deg,#005500,#00ff88);color:#001a08;box-shadow:0 0 14px rgba(0,255,120,0.5);}

.stage{width:700px;height:240px;position:relative;display:flex;align-items:center;justify-content:center;border-radius:12px;overflow:hidden;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,60,20,0.6),transparent),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(0,40,10,0.4),transparent),#010a02;}
.stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(0,200,60,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,60,0.04) 1px,transparent 1px);background-size:40px 40px;animation:grid-move 8s linear infinite;pointer-events:none;}
@keyframes grid-move{0%{background-position:0 0}100%{background-position:40px 40px}}
.flash{position:absolute;inset:0;border-radius:12px;opacity:0;pointer-events:none;transition:opacity 0.05s;z-index:100;}
.ptc{position:absolute;inset:0;pointer-events:none;z-index:99;overflow:hidden;}

.ov{position:absolute;display:flex;flex-direction:column;align-items:center;width:700px;opacity:0;transform:scale(0.88) translateY(-18px);pointer-events:none;transition:opacity 0.5s cubic-bezier(0.22,1,0.36,1),transform 0.5s cubic-bezier(0.22,1,0.36,1);}
.ov.show{opacity:1;transform:scale(1) translateY(0);}

/* NOTIF CARD */
.nc{background:linear-gradient(180deg,rgba(0,10,4,0.97),rgba(0,16,6,0.96));border:2px solid rgba(0,220,80,0.9);border-bottom:none;border-radius:14px 14px 0 0;padding:6px 48px 8px;display:flex;flex-direction:column;align-items:center;gap:1px;width:700px;position:relative;overflow:hidden;box-shadow:0 -6px 40px rgba(0,180,60,0.35),inset 0 1px 0 rgba(80,255,140,0.2);}
.nc::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00ff88,#ccffee,#00ff88,transparent);animation:shimmer 2s ease-in-out infinite;}
@keyframes shimmer{0%{left:-100%}60%{left:100%}100%{left:100%}}
.nc-top{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:#00cc55;letter-spacing:5px;text-shadow:0 0 10px rgba(0,200,80,0.8);}
.nc-div{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,220,80,0.7),transparent);margin:2px 0;}
.nc-name{font-family:'Russo One',sans-serif;font-size:44px;color:#fff;text-shadow:0 0 24px rgba(0,220,100,0.9),0 0 50px rgba(0,160,60,0.5),0 2px 8px #000;max-width:560px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.05;letter-spacing:1px;}

/* SPIN */
.ss{width:700px;display:flex;flex-direction:column;align-items:center;max-height:0;overflow:hidden;transition:max-height 0.5s cubic-bezier(0.22,1,0.36,1);}
.ss.open{max-height:180px;}
.ptr{width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:22px solid #00ff88;margin-bottom:-1px;z-index:10;filter:drop-shadow(0 0 10px rgba(0,255,120,1)) drop-shadow(0 0 20px rgba(0,200,80,0.7));}
.sw{width:700px;height:118px;border-radius:0 0 14px 14px;overflow:hidden;border:2px solid rgba(0,200,80,0.7);border-top:none;background:linear-gradient(180deg,rgba(0,8,3,0.98),rgba(0,12,5,0.97));position:relative;box-shadow:0 8px 40px rgba(0,160,50,0.2);}
.sw::before{content:"";position:absolute;top:0;bottom:0;left:0;width:140px;background:linear-gradient(to right,rgba(0,8,3,0.97),transparent);z-index:2;}
.sw::after{content:"";position:absolute;top:0;bottom:0;right:0;width:140px;background:linear-gradient(to left,rgba(0,8,3,0.97),transparent);z-index:2;}
.cl{position:absolute;left:50%;top:4px;bottom:4px;transform:translateX(-50%);width:144px;border:2px solid rgba(0,240,100,0.85);border-radius:10px;z-index:3;animation:cl-pulse 1.8s ease-in-out infinite;}
@keyframes cl-pulse{0%,100%{box-shadow:0 0 12px rgba(0,220,80,0.5)}50%{box-shadow:0 0 28px rgba(0,255,100,0.9),0 0 50px rgba(0,180,60,0.4)}}
.tk{display:flex;align-items:center;height:118px;will-change:transform;}

/* BOX 3D */
.box{min-width:136px;width:136px;height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;margin:0 2px;user-select:none;flex-shrink:0;position:relative;overflow:hidden;gap:4px;}
.box-icon{font-size:0;line-height:1;width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
.box-icon svg{width:44px;height:44px;}
.box-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;font-weight:700;}

/* ZONK 3D — merah dengan X */
.zonk{
  background:linear-gradient(160deg,#1a0000 0%,#0f0000 40%,#080000 100%);
  border-top:2px solid rgba(255,70,70,0.6);
  border-left:2px solid rgba(180,30,30,0.4);
  border-right:2px solid rgba(60,0,0,0.8);
  border-bottom:2px solid rgba(40,0,0,0.9);
  box-shadow:inset 0 2px 6px rgba(255,80,80,0.15),inset 0 -3px 8px rgba(0,0,0,0.6),2px 4px 12px rgba(0,0,0,0.7);
  color:#ff4444;
}
.zonk::before{content:"";position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,50,50,0.1),transparent);border-radius:10px 10px 0 0;}
.zonk::after{content:"";position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(0deg,rgba(0,0,0,0.5),transparent);}

/* JACKPOT 3D — hijau money */
.jackpot{
  background:linear-gradient(160deg,#001a08 0%,#000f04 40%,#000802 100%);
  border-top:2px solid rgba(0,255,120,0.8);
  border-left:2px solid rgba(0,180,80,0.5);
  border-right:2px solid rgba(0,50,20,0.8);
  border-bottom:2px solid rgba(0,30,10,0.9);
  box-shadow:inset 0 2px 8px rgba(0,255,100,0.2),inset 0 -3px 10px rgba(0,0,0,0.6),2px 4px 12px rgba(0,0,0,0.7);
  color:#00ff88;
}
.jackpot::before{content:"";position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(0,255,100,0.15),transparent);border-radius:10px 10px 0 0;}
.jackpot::after{content:"";position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(0deg,rgba(0,0,0,0.5),transparent);}

/* RESULT BADGE */
.rb{margin-top:7px;padding:7px 32px;border-radius:40px;font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;opacity:0;transform:scale(0.6) translateY(8px);transition:opacity 0.4s cubic-bezier(0.22,1,0.36,1),transform 0.4s cubic-bezier(0.22,1,0.36,1);}
.rb.show{opacity:1;transform:scale(1) translateY(0);}
.rb-j{background:linear-gradient(90deg,rgba(0,200,80,0.1),rgba(0,255,120,0.22),rgba(0,200,80,0.1));border:2px solid rgba(0,230,100,0.9);color:#00ff88;text-shadow:0 0 16px rgba(0,255,120,1),0 0 40px rgba(0,180,60,0.5);box-shadow:0 0 28px rgba(0,200,80,0.4);animation:j-pop 0.5s ease 3;}
@keyframes j-pop{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.rb-z{background:rgba(100,0,0,0.3);border:2px solid rgba(220,40,40,0.8);color:#FF5555;text-shadow:0 0 12px rgba(255,60,60,0.7);}
</style>
</head>
<body>

<div class="label">💚 PREVIEW — HIJAU MONEY + BOX 3D</div>
<div class="btn-row">
  <button class="btn btn-f" onclick="go('tester',false)">▶ Test Follow (ZONK)</button>
  <button class="btn btn-j" onclick="go('jackpotwinner',true)">💎 Test JACKPOT</button>
</div>

<div class="stage" id="stage">
  <div class="flash" id="flash"></div>
  <div class="ptc" id="ptc"></div>
  <div class="ov" id="ov">
    <div class="nc">
      <div class="nc-top">FLW = 1 SPIN</div>
      <div class="nc-div"></div>
      <div class="nc-name" id="ncname">@username</div>
    </div>
    <div class="ss" id="ss">
      <div class="ptr"></div>
      <div class="sw">
        <div class="cl"></div>
        <div class="tk" id="tk"></div>
      </div>
    </div>
    <div class="rb" id="rb"></div>
  </div>
</div>

<script>
const BOX_W=140,TOTAL=240;
let boxes=[],isRunning=false;
const actx=new(window.AudioContext||window.webkitAudioContext)();

function svgJackpot(){
  return `<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dg" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ccffe8"/>
      <stop offset="40%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#006633"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g opacity="0.5">
    <line x1="22" y1="2" x2="22" y2="6" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="38" x2="22" y2="42" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="22" x2="6" y2="22" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="38" y1="22" x2="42" y2="22" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6.7" y1="6.7" x2="9.5" y2="9.5" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="34.5" y1="34.5" x2="37.3" y2="37.3" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="37.3" y1="6.7" x2="34.5" y2="9.5" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9.5" y1="34.5" x2="6.7" y2="37.3" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <polygon points="22,8 38,22 22,36 6,22" fill="url(#dg)" filter="url(#glow)"/>
  <polygon points="22,8 38,22 22,22" fill="rgba(255,255,255,0.25)"/>
  <polygon points="22,8 6,22 22,22" fill="rgba(0,0,0,0.1)"/>
  <polygon points="22,36 38,22 22,22" fill="rgba(0,0,0,0.15)"/>
  <ellipse cx="17" cy="16" rx="4" ry="2.5" fill="rgba(255,255,255,0.55)" transform="rotate(-20,17,16)"/>
  <polygon points="22,11 22.8,13.4 25.3,13.4 23.3,14.9 24.1,17.3 22,15.8 19.9,17.3 20.7,14.9 18.7,13.4 21.2,13.4" fill="#ccffe8" opacity="0.7"/>
</svg>`;
}

function svgZonk(){
  return `<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="zg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff8888"/>
      <stop offset="60%" stop-color="#cc1111"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <filter id="zglow"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="22" cy="22" r="17" fill="url(#zg)" filter="url(#zglow)"/>
  <circle cx="22" cy="22" r="17" fill="none" stroke="rgba(255,100,100,0.5)" stroke-width="1.5"/>
  <ellipse cx="17" cy="15" rx="5" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(-15,17,15)"/>
  <line x1="13" y1="13" x2="31" y2="31" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="31" y1="13" x2="13" y2="31" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="13" y1="13" x2="31" y2="31" stroke="rgba(255,180,180,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="13" x2="13" y2="31" stroke="rgba(255,180,180,0.4)" stroke-width="2" stroke-linecap="round"/>
  <path d="M16 28 Q22 33 28 28" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>`;
}

function buildTrack(){
  const tk=document.getElementById('tk');
  tk.innerHTML='';boxes=[];
  for(let i=0;i<TOTAL;i++){
    const isJ=(i%5===0);
    const el=document.createElement('div');
    el.className='box '+(isJ?'jackpot':'zonk');
    el.innerHTML=`<div class="box-icon">${isJ?svgJackpot():svgZonk()}</div><div class="box-label">${isJ?'JACKPOT':'ZONK'}</div>`;
    tk.appendChild(el);
    boxes.push({el,type:isJ?'jackpot':'zonk',index:i});
  }
}
buildTrack();

function playSpinLoop(dur){
  let el=0,iv=55;
  const id=setInterval(()=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    o.frequency.setValueAtTime(900,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(400,actx.currentTime+0.03);
    g.gain.setValueAtTime(0.1,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.04);
    o.start();o.stop(actx.currentTime+0.05);
    el+=iv;iv=Math.min(iv+11,270);
    if(el>=dur)clearInterval(id);
  },iv);
}
function playZonk(){
  const now=actx.currentTime;
  [200,160,120].forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sawtooth';o.connect(g);g.connect(actx.destination);
    o.frequency.setValueAtTime(f,now+i*0.2);
    g.gain.setValueAtTime(0.2,now+i*0.2);
    g.gain.exponentialRampToValueAtTime(0.001,now+i*0.2+0.45);
    o.start(now+i*0.2);o.stop(now+i*0.2+0.5);
  });
}
function playJackpot(){
  const now=actx.currentTime;
  [523,659,784,1047,1319,1568,2093].forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='triangle';o.connect(g);g.connect(actx.destination);
    o.frequency.setValueAtTime(f,now+i*0.09);
    g.gain.setValueAtTime(0.2,now+i*0.09);
    g.gain.exponentialRampToValueAtTime(0.001,now+i*0.09+0.3);
    o.start(now+i*0.09);o.stop(now+i*0.09+0.35);
  });
  for(let i=0;i<12;i++){
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';o.connect(g);g.connect(actx.destination);
    o.frequency.setValueAtTime(1200+Math.random()*1200,now+0.7+i*0.07);
    g.gain.setValueAtTime(0.07,now+0.7+i*0.07);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.7+i*0.07+0.12);
    o.start(now+0.7+i*0.07);o.stop(now+0.7+i*0.07+0.18);
  }
}

function spawnParticles(isJ){
  const pc=document.getElementById('ptc');
  pc.innerHTML='';
  const colors=isJ?['#00ff88','#00cc55','#88ffcc','#ccffe8','#fff','#00ffaa']:['#cc1111','#ff4444','#880000'];
  const count=isJ?60:10;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    const angle=Math.random()*360;
    const dist=(isJ?100:40)+Math.random()*(isJ?220:60);
    const tx=Math.cos(angle*Math.PI/180)*dist;
    const ty=Math.sin(angle*Math.PI/180)*dist-(isJ?100:30);
    const size=isJ?(3+Math.random()*8):(3+Math.random()*4);
    const shape=isJ&&Math.random()>0.5?'4px':'50%';
    p.style.cssText=`position:absolute;border-radius:${shape};left:${270+Math.random()*160}px;top:${50+Math.random()*80}px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${size}px;height:${size}px;--tx:${tx}px;--ty:${ty}px;animation:pf ${0.8+Math.random()*0.6}s ease-out ${Math.random()*0.35}s forwards;`;
    pc.appendChild(p);
  }
  setTimeout(()=>pc.innerHTML='',2000);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function go(name,forceJ){
  if(isRunning)return;
  if(actx.state==='suspended')actx.resume();
  isRunning=true;
  const ov=document.getElementById('ov'),ss=document.getElementById('ss'),tk=document.getElementById('tk'),nm=document.getElementById('ncname'),rb=document.getElementById('rb'),fl=document.getElementById('flash');
  rb.className='rb';rb.classList.remove('show');
  ss.classList.remove('open');
  tk.style.transition='none';tk.style.transform='translateX(0px)';
  nm.textContent='@'+name;
  ov.classList.add('show');
  await sleep(1800);
  ss.classList.add('open');
  await sleep(560);
  const isJ=forceJ||Math.random()<0;
  const pool=boxes.filter(b=>b.type===(isJ?'jackpot':'zonk')&&b.index>140&&b.index<200);
  const target=pool[Math.floor(Math.random()*pool.length)];
  const finalX=target.index*BOX_W-280;
  playSpinLoop(7000);
  tk.offsetHeight;
  tk.style.transition='transform 7s cubic-bezier(0.08,0,0.08,1)';
  tk.style.transform=`translateX(-${finalX}px)`;
  await sleep(7400);
  if(isJ){
    fl.style.background='rgba(0,220,100,0.5)';
    fl.style.opacity='0.7';
    setTimeout(()=>fl.style.opacity='0',130);
    spawnParticles(true);
    playJackpot();
    rb.textContent='💎 JACKPOT! 💎';
    rb.className='rb rb-j';
  } else {
    spawnParticles(false);
    playZonk();
    rb.textContent='✖ ZONK';
    rb.className='rb rb-z';
  }
  rb.classList.add('show');
  await sleep(2800);
  ov.classList.remove('show');
  await sleep(500);
  ss.classList.remove('open');
  rb.classList.remove('show');
  isRunning=false;
}
window.addFollow=name=>go(name,false);
</script>
<style>@keyframes pf{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2)}}</style>
</body>
</html>
